{% extends 'base.html' %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="text-center">
    <div class="display-1 text-accent fw-bold">500</div>
    <h2 class="mb-3">Something Went Wrong</h2>
    <p class="text-muted-custom">Our team has been notified. Please try again in a few moments.</p>
    <div class="d-flex justify-content-center gap-3 mt-4">
      <a class="btn btn-outline-primary" href="/">Home</a>
      <a class="btn btn-primary" href="javascript:location.reload()">Retry</a>
      <a class="btn btn-outline-primary" href="/contact">Contact Support</a>
    </div>
    <div class="mt-4 text-muted-custom">
      <i class="bi bi-exclamation-triangle font-size-2rem"></i>
    </div>
  </div>
</div>
{% endblock %}
