<!DOCTYPE html>
<html lang="{{ lang|default('en') }}" data-theme="{{ session.get('theme', 'light') }}">
<head>
  <script nonce="{{ csp_nonce }}">
    (function () {
      var THEME_KEY = "udl-theme";
      var DEFAULT_THEME = "light";
      try {
        var stored = localStorage.getItem(THEME_KEY);
        var theme = stored || DEFAULT_THEME;
        if (theme !== "dark" && theme !== "light") {
          theme = DEFAULT_THEME;
        }
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.setAttribute("data-bs-theme", theme);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", DEFAULT_THEME);
        document.documentElement.setAttribute("data-bs-theme", DEFAULT_THEME);
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}UniversalDL{% endblock %} | Universal Media Downloader</title>
  <meta name="description" content="{% block meta_desc %}Download anything from any platform. No APIs. No ads. No limits.{% endblock %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  {% block extra_css %}{% endblock %}
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#E94560">
</head>
<body {% block body_attrs %}{% endblock %}>
  {% include 'components/flash_messages.html' %}
  {% block navbar %}
    {% include 'components/navbar.html' %}
  {% endblock %}
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block footer %}
    {% include 'components/footer.html' %}
  {% endblock %}
  <script nonce="{{ csp_nonce }}" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script nonce="{{ csp_nonce }}" src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script nonce="{{ csp_nonce }}" src="{{ url_for('static', filename='js/pwa.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
